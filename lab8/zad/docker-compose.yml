
services:
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    depends_on:
      backend_1:
        condition: service_started
      backend_2:
        condition: service_started
    configs:
      - source: nginx_conf
        target: /etc/nginx/nginx.conf
    networks:
      - proxy-net
  
  backend_1:
    build:
      context: ./backend
    environment:
      - DB_HOST=postgres
      - DB_NAME=${POSTGRES_DB}
      - BACKEND_PORT=${BACKEND_PORT_1}
      - REDIS_URL=${REDIS_URL}
    secrets:
      - db_user
      - db_password
    configs:
      - source: backend_config
        target: /app/app.config.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proxy-net
      - app-net
      - db-net
  
  backend_2:
    build:
      context: ./backend
    environment:
      - DB_HOST=postgres
      - DB_NAME=${POSTGRES_DB}
      - BACKEND_PORT=${BACKEND_PORT_2}
      - REDIS_URL=${REDIS_URL}
    secrets:
      - db_user
      - db_password
    configs:
      - source: backend_config
        target: /app/app.config.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proxy-net
      - app-net
      - db-net

  worker:
    build:
      context: ./worker
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - REDIS_URL=${REDIS_URL}
    secrets:
      - db_user
      - db_password
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net
      - db-net
    
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_user
      - db_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $(cat /run/secrets/db_user)"]
      interval: 5s
      retries: 5
    networks:
      - db-net
    
  redis:
    image: redis:7
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    networks:
      - app-net
  adminer:
    image: adminer
    ports:
      - "8081:8080"
    networks:
      - db-net
secrets:
  db_user:
    file: ./secrets/db_user.txt
  db_password:
    file: ./secrets/db_password.txt
configs:
  nginx_conf:
    file: ./nginx.conf
  backend_config:
    file: ./backend/app.config.json

volumes:
  postgres-data:
  redis-data:
networks:
  proxy-net:
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

  app-net:
    ipam:
      config:
        - subnet: 172.21.0.0/16
          gateway: 172.21.0.1

  db-net:
    ipam:
      config:
        - subnet: 172.22.0.0/16
          gateway: 172.22.0.1